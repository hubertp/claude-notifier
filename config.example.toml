# claude-notifier configuration
# Place this file at ~/.config/claude-notifier/config.toml

[global]
## Timeout for each plugin's Send call
timeout = "10s"

## ntfy push notifications
## https://docs.ntfy.sh
[[notifiers.ntfy]]

## ntfy server URL including topic (required)
url = "https://ntfy.sh/my-topic"

## Enable markdown formatting (web app only)
# markdown = true

## Go template for the message body
## Available variables: {{.Message}}, {{.Title}}, {{.Project}}, {{.Cwd}},
## {{.NotificationType}}, {{.SessionID}}, {{.TranscriptPath}}
## Custom variables from [notifiers.ntfy.vars] are also available, title-cased
# message = "{{.Message}}"

## Go template for the notification title
# title = "Claude Code ({{.Project}})"

## Message priority: min, low, default, high, urgent
# priority = ""

## Comma-separated emoji tags (e.g. "robot,warning")
# tags = ""

## Notification icon URL (JPEG/PNG)
# icon = ""

## URL opened when tapping the notification
# click = ""

## URL of file to attach
# attach = ""

## Override attachment filename
# filename = ""

## Email address for notification forwarding
# email = ""

## Scheduled delivery (e.g. "30m", "2h", "tomorrow 10am")
# delay = ""

## Action buttons (ntfy actions format)
## https://docs.ntfy.sh/publish/#action-buttons
# actions = ""

## Access token for authentication (Bearer)
# token = ""

## Username and password for basic authentication
# username = ""
# password = ""

## User-defined template variables
## Keys are title-cased for template access (env -> {{.Env}})
# [notifiers.ntfy.vars]
# env = "production"

## Linux desktop notifications via notify-send (libnotify)
## https://man.archlinux.org/man/notify-send.1
[[notifiers.notify-send]]

## Path to the notify-send binary (required)
## Install: apt install libnotify-bin  /  dnf install libnotify  /  pacman -S libnotify
path = "notify-send"

## Go template for the notification body
## Available variables: {{.Message}}, {{.Title}}, {{.Project}}, {{.Cwd}},
## {{.NotificationType}}, {{.SessionID}}, {{.TranscriptPath}}
## Custom variables from [notifiers.notify-send.vars] are also available, title-cased
# message = "{{.Message}}"

## Go template for the notification title
# title = "Claude Code ({{.Project}})"

## App name shown in the notification center
# app_name = "Claude Code"

## Urgency: "auto" (maps permission_prompt -> critical, else normal),
## or one of "low", "normal", "critical"
# urgency = "auto"

## Icon: a freedesktop icon name (e.g. "dialog-information",
## "dialog-warning", "emblem-important") or an absolute path to an image
# icon = ""

## Expiration in milliseconds. Omit (or leave at 0) to use the DE default.
## notify-send's own "0 = never" is shadowed: set a large value (e.g. 86400000)
## if you need effectively-never.
# expire_time = 0

## User-defined template variables
## Keys are title-cased for template access (env -> {{.Env}})
# [notifiers.notify-send.vars]
# env = "production"

## macOS desktop notifications via terminal-notifier
## https://github.com/julienXX/terminal-notifier
[[notifiers.terminal-notifier]]

## Path to the terminal-notifier binary (required)
## Install: brew install terminal-notifier
path = "terminal-notifier"

## Go template for the message body
## Available variables: {{.Message}}, {{.Title}}, {{.Project}}, {{.Cwd}},
## {{.NotificationType}}, {{.SessionID}}, {{.TranscriptPath}}
## Custom variables from [notifiers.terminal-notifier.vars] are also available, title-cased
# message = "{{.Message}}"

## Go template for the notification title
# title = "Claude Code ({{.Project}})"

## Go template for the notification subtitle
# subtitle = ""

## Sound to play ("default" for system default, or a sound name from /System/Library/Sounds)
# sound = ""

## Group ID — only one notification per group is shown, replacing previous ones
## Defaults to session ID so notifications from the same session replace each other
# group = "{{.SessionID}}"

## URL or custom scheme to open when clicking the notification
## Not templated — static string for security (terminal-notifier executes these)
# open = ""

## Shell command to run when clicking the notification
## Not templated — static string for security (terminal-notifier executes these)
# execute = ""

## App bundle ID to activate when clicking the notification
# activate = ""

## Fake sender app bundle ID
# sender = ""

## Path to a custom app icon image
# app_icon = ""

## Path to an image to attach inside the notification
# content_image = ""

## Send notification even when Do Not Disturb is active
# ignore_dnd = false

## User-defined template variables
## Keys are title-cased for template access (env -> {{.Env}})
# [notifiers.terminal-notifier.vars]
# env = "production"
